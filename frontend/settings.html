<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VibeChat | Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Base -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/settings.css" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f4f5f7;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 10px;
      font-size: 1.1rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .card {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      margin-top: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .row span {
      font-size: 0.9rem;
    }

    button {
      margin-top: 16px;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    .danger {
      background: #b91c1c;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- PROFILE -->
  <h2>Profile</h2>
  <div class="card">
    <label>Name</label>
    <input type="text" id="name" value="Raj" />

    <label>Email</label>
    <input type="email" id="email" value="raj@email.com" disabled />

    <button id="saveProfile">Save Profile</button>
  </div>

  <!-- LANGUAGE -->
  <h2>Language</h2>
  <div class="card">
    <label>App Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="mr">Marathi</option>
      <option value="gu">Gujarati</option>
    </select>

    <button id="saveLanguage">Save Language</button>
  </div>

  <!-- PRIVACY -->
  <h2>Privacy</h2>
  <div class="card">

    <div class="row">
      <span>Last Seen</span>
      <select id="lastSeen">
        <option value="everyone">Everyone</option>
        <option value="contacts">Contacts</option>
        <option value="nobody">Nobody</option>
      </select>
    </div>

    <div class="row">
      <span>Profile Photo</span>
      <select id="photo">
        <option value="everyone">Everyone</option>
        <option value="contacts">Contacts</option>
        <option value="nobody">Nobody</option>
      </select>
    </div>

    <div class="row">
      <span>Read Receipts</span>
      <input type="checkbox" id="readReceipts" checked />
    </div>

  </div>

  <!-- ACCOUNT -->
  <h2>Account</h2>
  <div class="card">
    <button class="danger" id="logout">Logout</button>
  </div>

</div>

<script>
  document.getElementById("saveProfile").onclick = () => {
    alert("Profile saved (temporary)");
  };

  document.getElementById("saveLanguage").onclick = () => {
    alert("Language preference saved");
  };

  document.getElementById("logout").onclick = () => {
    window.location.href = "index.html";
  };
</script>

</body>
</html>
