<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VibeChat | Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>

  <main class="auth-screen">
    <div class="auth-card">

      <div class="auth-brand">
        <img src="assets/images/vibechat-logo.png" alt="VibeChat logo" />
        <h1>VibeChat</h1>
        <p>Connect. Chat. Vibe.</p>
      </div>

      <form id="loginForm" autocomplete="on">
        <label class="field">
          <span class="label-text">ID / Phone / Username</span>
          <input
            type="text"
            name="identifier"
            placeholder="Enter ID, phone or username"
            required
            autocomplete="username"
          />
        </label>

        <label class="field">
          <span class="label-text">Password</span>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
            autocomplete="current-password"
          />
        </label>

        <p class="field-error hidden" id="loginError"></p>

        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <small class="auth-footer">
        New here? <a href="signup.html" class="auth-link">Create account</a>
      </small>

    </div>
  </main>

  <script src="config/env.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
