<!-- Settings Sheet -->
<div class="sheet-overlay" id="settingsSheet"
  onclick="closeSheet(event,'settingsSheet')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">⚙️ Settings</div>

    <div class="settings-section">
      <div class="settings-label">Account</div>
      <div class="settings-item" onclick="closeSheet(event,'settingsSheet');
        setTimeout(function(){ window.VibeProfile && window.VibeProfile.openEditor(); }, 200);">
        <span class="settings-icon">👤</span> Edit Profile<span class="settings-item-arrow">›</span>
      </div>
      <div class="settings-item">
        <span class="settings-icon">🔒</span> Privacy<span class="settings-item-arrow">›</span>
      </div>
      <div class="settings-item">
        <span class="settings-icon">🔔</span> Notifications<span class="settings-item-arrow">›</span>
      </div>
    </div>

    <!-- ■■ Change Password Section ■■ -->
    <div class="settings-section">
      <div class="settings-label">Change Password</div>
      <form id="changePasswordForm" style="padding: 8px 0;">
        <div style="display:flex;flex-direction:column;gap:10px;">
          <input
            type="password"
            id="currentPassword"
            placeholder="Purana Password"
            autocomplete="current-password"
            style="width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(0,100,255,0.3);background:rgba(0,40,100,0.4);color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
          />
          <input
            type="password"
            id="newPassword"
            placeholder="Naya Password (min 6 chars)"
            autocomplete="new-password"
            style="width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(0,100,255,0.3);background:rgba(0,40,100,0.4);color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
          />
          <input
            type="password"
            id="confirmPassword"
            placeholder="Naya Password Confirm Karo"
            autocomplete="new-password"
            style="width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(0,100,255,0.3);background:rgba(0,40,100,0.4);color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
          />
          <p id="passwordMsg" style="font-size:13px;margin:2px 0;min-height:18px;"></p>
          <button
            type="submit"
            style="width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#0080ff,#0050cc);color:#fff;font-size:14px;font-weight:700;cursor:pointer;">
            Change Password
          </button>
        </div>
      </form>
    </div>

    <div class="settings-section">
      <div class="settings-label">Preferences</div>
      <div class="settings-item">
        <span class="settings-icon">🌙</span> Dark Mode
        <div class="toggle on" id="darkModeToggle"
          onclick="this.classList.toggle('on')"></div>
      </div>
      <div class="settings-item">
        <span class="settings-icon">🔊</span> Sound
        <div class="toggle on" id="soundToggle"
          onclick="this.classList.toggle('on')"></div>
      </div>
      <div class="settings-item">
        <span class="settings-icon">🌐</span> Language<span class="settings-item-arrow">›</span>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-label">Support</div>
      <div class="settings-item">
        <span class="settings-icon">❓</span> Help &amp; FAQ<span class="settings-item-arrow">›</span>
      </div>
      <div class="settings-item" style="color:#ff5060;" onclick="handleSignOut()">
        <span class="settings-icon">🚪</span> Sign Out
      </div>
    </div>
  </div>
</div>
