<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VibeChat</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages/chat.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #dmContent {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .group-content,
    .calls-content {
      flex: 1;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<div class="phone">
  <!-- (⚠️ UI content unchanged — exactly same as your version) -->

  <!-- ── Scripts ── -->

<!-- Socket.IO CDN MUST be before socket.js -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script src="config/env.js"></script>
<script src="js/core/state.js"></script>
<script src="js/core/api.js"></script>
<script src="js/core/socket.js"></script>

<script src="js/utils/format.js"></script>
<script src="js/utils/time.js"></script>
<script src="js/utils/validators.js"></script>

<script src="js/ui/header.js"></script>
<script src="js/ui/overlays.js"></script>
<script src="js/ui/bottomNav.js"></script>

<script src="js/pages/chat.js"></script>
<script src="js/pages/group.js"></script>
<script src="js/pages/calls.js"></script>

<script>
  initHeader();

  function handleSignOut() {
    if (window.VibeState) window.VibeState.clearSession();
    window.location.replace('./index.html');
  }
</script>

</body>
</html>
