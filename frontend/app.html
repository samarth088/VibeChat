<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VibeChat</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages/chat.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #dmContent {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
  </style>
</head>

<body>

<div class="phone">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="profile-avatar-big">V</div>
    </div>
    <div class="header-title">VibeChat</div>
    <div class="header-right">
      <button onclick="openSearch()">Search</button>
    </div>
  </div>

  <!-- DM LIST -->
  <div id="dmContent">
    <div id="dmEmpty" style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);">
      No conversations yet
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button onclick="switchTab('dm')">DM</button>
    <button onclick="switchTab('group')">Group</button>
    <button onclick="switchTab('calls')">Calls</button>
  </div>

</div>

<!-- Socket.IO CDN -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script src="config/env.js"></script>
<script src="js/core/state.js"></script>
<script src="js/core/api.js"></script>
<script src="js/core/socket.js"></script>

<script src="js/pages/chat.js"></script>

</body>
</html>
