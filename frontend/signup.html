<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VibeChat | Sign Up</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>
  <main class="auth-screen">
    <div class="auth-card">

      <div class="auth-brand">
        <img src="assets/images/vibechat-logo.png" alt="VibeChat logo" />
        <h1>VibeChat</h1>
        <p id="authSubtitle">Create your account. Start vibing.</p>
      </div>

      <!-- STEP 1: Details -->
      <form id="signupForm" autocomplete="off">

        <label class="field">
          <span class="label-text">Full Name</span>
          <input type="text" name="fullname" placeholder="Enter your full name" required autocomplete="name" />
        </label>

        <label class="field">
          <span class="label-text">Username</span>
          <input type="text" name="username" placeholder="e.g. cool_viber (3-20 chars)" required autocomplete="off" />
        </label>

        <label class="field">
          <span class="label-text">Email Address</span>
          <input type="email" name="email" placeholder="Enter your email address" required autocomplete="email" />
        </label>

        <label class="field">
          <span class="label-text">Password</span>
          <input type="password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password" />
        </label>

        <label class="field">
          <span class="label-text">Confirm Password</span>
          <input type="password" name="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password" />
        </label>

        <p class="field-error hidden" id="signupError"></p>

        <button type="submit" class="btn-primary">Send OTP</button>

      </form>

      <!-- STEP 2: OTP -->
      <div id="otpPhase" class="hidden">
        <div class="otp-info">
          <div class="otp-icon">📧</div>
          <p class="otp-sent-text">OTP sent to <span id="otpEmailDisplay"></span></p>
          <p class="otp-sub">Enter the 6-digit code sent to your email</p>
        </div>

        <div class="otp-boxes" id="otpBoxes">
          <input class="otp-box" type="tel" maxlength="1" />
          <input class="otp-box" type="tel" maxlength="1" />
          <input class="otp-box" type="tel" maxlength="1" />
          <input class="otp-box" type="tel" maxlength="1" />
          <input class="otp-box" type="tel" maxlength="1" />
          <input class="otp-box" type="tel" maxlength="1" />
        </div>

        <p class="field-error hidden" id="otpError"></p>
        <p class="field-success hidden" id="otpSuccess"></p>

        <button class="btn-primary" id="verifyOtpBtn">Verify &amp; Create Account</button>

        <div class="otp-resend">
          <span id="otpTimer">Resend in <b id="timerCount">30</b>s</span>
          <button class="btn-link hidden" id="resendBtn">Resend OTP</button>
        </div>

        <button class="btn-link-gray" id="backBtn">← Change details</button>
      </div>

      <small class="auth-footer">
        Already have an account? <a href="index.html" class="auth-link">Sign in</a>
      </small>

    </div>
  </main>

  <script src="config/env.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/pages/signup.js"></script>

</body>
</html>
